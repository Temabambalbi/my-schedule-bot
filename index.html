<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Terminal v6.0 Hack Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-color: #00ff41;
            --card-bg: #0a0a0a;
            --text-color: #00ff41;
        }

        html, body {
            position: fixed; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.3s;
        }

        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; color: var(--text-color); }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .active-screen { display: flex; }

        .control-panel { display: flex; gap: 10px; margin-bottom: 15px; flex-shrink: 0; }
        .back-btn {
            background: var(--main-color); color: var(--bg-color);
            border: none; padding: 15px; border-radius: 12px;
            flex-grow: 1; font-weight: bold; font-family: inherit;
        }

        .menu-grid { display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center; }
        .hub-btn {
            background: var(--card-bg); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 25px 20px;
            font-size: 18px; font-weight: bold; border-radius: 15px; font-family: inherit;
            text-align: center; cursor: pointer;
        }

        /* Блок синхронизации */
        .sync-box {
            border: 1px dashed var(--main-color); padding: 15px;
            border-radius: 12px; margin-top: 20px;
        }

        .lesson-card { background: var(--card-bg); border: 1px solid var(--main-color); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .hw-input { background: transparent; border: 1px solid var(--main-color); color: var(--text-color); padding: 10px; width: 100%; box-sizing: border-box; margin-top: 10px; font-family: inherit; border-radius: 6px; }
        input { background: #111; border: 1px solid var(--main-color); color: var(--main-color); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <h1 style="text-align: center; letter-spacing: 5px;">TERMINAL HUB</h1>
        <div class="menu-grid">
            <div class="hub-btn" onclick="showScreen('diary-screen')">📂 МІЙ ЩОДЕННИК</div>
            <div class="hub-btn" style="border-color: #0077ff; color: #0077ff;" onclick="showScreen('sync-screen')">⚡ СИНХРОНІЗАЦІЯ ЭШ</div>
            <div class="hub-btn" style="opacity: 0.6; font-size: 14px;" onclick="showScreen('settings-screen')">⚙️ ТЕМИ</div>
        </div>
    </div>

    <div id="sync-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <div class="sync-box">
            <h3 style="margin-top:0;">E-SCHOOL INTERCEPT</h3>
            <input type="text" id="es-login" placeholder="Логін">
            <input type="password" id="es-pass" placeholder="Пароль">
            <button class="hub-btn" style="width:100%; padding:15px;" onclick="runIntercept()">ЗАПУСТИТИ ПЕРЕХВАТ</button>
        </div>
        <p id="sync-status" style="text-align:center; font-size:12px; margin-top:20px; color: #888;">Очікування команди...</p>
    </div>

    <div id="diary-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <div id="schedule-list" style="overflow-y: auto;"></div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <div class="hub-btn" style="border-color:#00ff41; color:#00ff41; margin-bottom:10px;" onclick="setTheme('green')">MATRIX GREEN</div>
        <div class="hub-btn" style="border-color:#000; color:#000; background:#fff;" onclick="setTheme('light')">LIGHT MODE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Тут хранится наше расписание
        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [];

        // --- ФУНКЦИЯ СВЯЗИ С МАЛИНКОЙ ---
        async function runIntercept() {
            const login = document.getElementById('es-login').value;
            const pass = document.getElementById('es-pass').value;
            const status = document.getElementById('sync-status');
            
            // !!! СЮДА ВСТАВЬ IP СВОЕЙ МАЛИНКИ ИЛИ ССЫЛКУ NGROK !!!
            const RASPBERRY_URL = "http://ТВОЙ_АЙПИ:5000/sync"; 

            if(!login || !pass) { alert("Введи дані!"); return; }

            status.innerText = "З'ЄДНАННЯ З МАЛИНКОЮ...";
            tg.HapticFeedback.impactOccurred('medium');

            try {
                const response = await fetch(RASPBERRY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: login, password: pass })
                });

                const result = await response.json();

                if(result.status === "success") {
                    status.innerText = "ДАНІ ПЕРЕХОПЛЕНІ! ✅";
                    schedule = result.data; // Записываем данные из ЭШ
                    localStorage.setItem('mySchedule', JSON.stringify(schedule));
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => showScreen('diary-screen'), 1500);
                } else {
                    status.innerText = "ПОМИЛКА: " + result.message;
                    tg.HapticFeedback.notificationOccurred('error');
                }
            } catch (err) {
                status.innerText = "МАЛИНКА НЕ ВІДПОВІДАЄ ❌";
                console.error(err);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'diary-screen') renderSchedule();
        }

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            schedule.forEach((l, i) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `<b>${l.name}</b><br><small>ДЗ: ${l.hw || 'Немає'}</small>`;
                list.appendChild(card);
            });
        }

        function setTheme(name) {
            if(name === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#ffffff');
                document.documentElement.style.setProperty('--main-color', '#000000');
                document.documentElement.style.setProperty('--card-bg', '#f2f2f2');
                document.documentElement.style.setProperty('--text-color', '#000000');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#000000');
                document.documentElement.style.setProperty('--main-color', '#00ff41');
                document.documentElement.style.setProperty('--card-bg', '#0a0a0a');
                document.documentElement.style.setProperty('--text-color', '#00ff41');
            }
        }
    </script>
</body>
</html>
