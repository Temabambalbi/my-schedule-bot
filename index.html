<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>School Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-green: #00ff41;
            --dark-green: #003300;
            --card-bg: #0a0a0a;
            --hw-color: #008f11; /* Цвет для домашки чуть тусклее */
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--main-green);
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Кнопка НАЗАД — теперь яркая и заметная */
        .back-btn {
            background: var(--main-green);
            color: #000;
            border: none;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            font-family: inherit;
            font-size: 16px;
            text-align: center;
        }

        /* Главное меню */
        .menu-grid { display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 80%; }
        .hub-btn {
            background: var(--card-bg);
            border: 2px solid var(--main-green);
            color: var(--main-green);
            padding: 35px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 15px;
            text-align: center;
        }

        /* Секции */
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
        .active-screen { display: flex; }

        /* Вкладки дней */
        .tabs { display: flex; justify-content: space-around; margin-bottom: 15px; border-bottom: 1px solid var(--dark-green); }
        .tab-btn { background: none; border: none; color: var(--dark-green); font-size: 18px; padding: 10px; }
        .tab-btn.active { color: var(--main-green); border-bottom: 2px solid var(--main-green); }

        /* Карточка урока */
        .lesson-card {
            background: var(--card-bg);
            border: 1px solid var(--dark-green);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column; /* Теперь контент идет колонкой */
            gap: 10px;
        }

        .lesson-main { display: flex; justify-content: space-between; align-items: center; }
        .lesson-room { border: 1px solid var(--main-green); padding: 5px 8px; border-radius: 4px; color: #fff; font-size: 18px;}

        /* Секция ДЗ внутри карточки */
        .hw-area {
            border-top: 1px dashed var(--dark-green);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hw-input {
            background: #000;
            border: 1px solid var(--dark-green);
            color: var(--hw-color);
            padding: 8px;
            font-family: inherit;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        /* ГДЗ */
        .gdz-link {
            background: var(--card-bg);
            color: var(--main-green);
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            border: 1px solid var(--main-green);
            margin-bottom: 10px;
        }

        #settings-btn { position: absolute; top: 10px; right: 10px; background: none; border: 1px solid var(--dark-green); color: var(--dark-green); padding: 8px; border-radius: 5px; z-index: 10; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <h1 style="text-align: center; letter-spacing: 5px;">HUB</h1>
        <div class="menu-grid">
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 ЩОДЕННИК</button>
            <button class="hub-btn" onclick="showScreen('gdz-screen')">🔍 ГДЗ</button>
        </div>
    </div>

    <div id="diary-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД В МЕНЮ</button>
        <button id="settings-btn" onclick="toggleEdit()">⚙</button>
        
        <div id="diary-view">
            <div class="tabs">
                <button class="tab-btn active" onclick="setDay(0)">ПН</button>
                <button class="tab-btn" onclick="setDay(1)">ВТ</button>
                <button class="tab-btn" onclick="setDay(2)">СР</button>
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button>
                <button class="tab-btn" onclick="setDay(4)">ПТ</button>
            </div>
            <div id="schedule-list"></div>
        </div>

        <div id="diary-edit" style="display:none; flex-direction: column; gap: 10px;">
            <h3 style="margin:0; text-align:center;">НАСТРОЙКИ</h3>
            <select id="lesson-day" style="background:#0a0a0a; color:#00ff41; padding:12px; border:1px solid var(--dark-green);">
                <option value="0">Понедельник</option>
                <option value="1">Вторник</option>
                <option value="2">Среда</option>
                <option value="3">Четверг</option>
                <option value="4">Пятница</option>
            </select>
            <input type="text" id="lesson-name" placeholder="Название урока" style="background:#0a0a0a; color:#00ff41; padding:12px; border:1px solid var(--dark-green);">
            <input type="text" id="lesson-room" placeholder="Кабинет" style="background:#0a0a0a; color:#00ff41; padding:12px; border:1px solid var(--dark-green);">
            <button onclick="addLesson()" style="padding:15px; background:var(--main-green); color:#000; border:none; font-weight:bold;">+ ДОБАВИТЬ В СПИСОК</button>
            <div id="edit-list" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="gdz-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД В МЕНЮ</button>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <a href="https://vshkole.com" target="_blank" class="gdz-link">VSHKOLE.COM</a>
            <a href="https://gdzonline.net/882-workbook-6-kosta.html" target="_blank" class="gdz-link">АНГЛ (WORKBOOK)</a>
            <a href="https://gdzonline.net/311-ukrayinska-mova-6-klas-zabolotniy.html" target="_blank" class="gdz-link">УКР МОВА</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Загружаем расписание или создаем пустое
        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [[],[],[],[],[]];
        let currentDayView = 0;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            if(screenId === 'diary-screen') renderSchedule();
        }

        // Рендер списка уроков с полем ДЗ
        function renderSchedule() {
            const listObj = document.getElementById('schedule-list');
            listObj.innerHTML = '';
            const dayLessons = schedule[currentDayView];

            dayLessons.forEach((lesson, index) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                // Подгружаем ДЗ из объекта урока, если оно есть
                const hwValue = lesson.hw || ''; 

                card.innerHTML = `
                    <div class="lesson-main">
                        <div>
                            <div style="font-size:12px;color:#003300">УРОК ${index+1}</div>
                            <div style="font-size:18px;">${lesson.name}</div>
                        </div>
                        <div class="lesson-room">${lesson.room}</div>
                    </div>
                    <div class="hw-area">
                        <span style="font-size:10px; color:var(--dark-green)">ДОМАШКА:</span>
                        <input type="text" class="hw-input" placeholder="Нажми, чтобы записать..." 
                            value="${hwValue}" 
                            onchange="saveHW(${currentDayView}, ${index}, this.value)">
                    </div>
                `;
                listObj.appendChild(card);
            });
        }

        // Сохранение ДЗ при вводе
        function saveHW(dayIdx, lessonIdx, value) {
            schedule[dayIdx][lessonIdx].hw = value;
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            tg.HapticFeedback.notificationOccurred('success');
        }

        function setDay(dayIndex) {
            currentDayView = dayIndex;
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.className = (idx === dayIndex) ? 'tab-btn active' : 'tab-btn';
            });
            renderSchedule();
        }

        function toggleEdit() {
            const v = document.getElementById('diary-view');
            const e = document.getElementById('diary-edit');
            if(v.style.display === 'none') {
                v.style.display = 'block'; e.style.display = 'none';
                renderSchedule();
            } else {
                v.style.display = 'none'; e.style.display = 'flex';
                renderEditList();
            }
        }

        function addLesson() {
            const d = document.getElementById('lesson-day').value;
            const n = document.getElementById('lesson-name').value;
            const r = document.getElementById('lesson-room').value;
            if(n && r) {
                schedule[d].push({name: n, room: r, hw: ''});
                localStorage.setItem('mySchedule', JSON.stringify(schedule));
                document.getElementById('lesson-name').value = '';
                document.getElementById('lesson-room').value = '';
                renderEditList();
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = '';
            schedule.forEach((day, dIdx) => {
                day.forEach((l, lIdx) => {
                    const item = document.createElement('div');
                    item.style.display = 'flex';
                    item.style.justifyContent = 'space-between';
                    item.style.padding = '10px';
                    item.style.borderBottom = '1px solid #111';
                    item.innerHTML = `<span>${l.name}</span><button onclick="deleteLesson(${dIdx},${lIdx})" style="color:#ff4444; background:none; border:none;">[УДАЛИТЬ]</button>`;
                    list.appendChild(item);
                });
            });
        }

        function deleteLesson(d, l) {
            schedule[d].splice(l, 1);
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            renderEditList();
        }

        tg.ready();
    </script>
</body>
</html>
