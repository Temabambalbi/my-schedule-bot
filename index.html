<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>School Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-green: #00ff41;
            --dark-green: #003300;
            --card-bg: #0a0a0a;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--main-green);
            margin: 0;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Общие стили для кнопок-плиток */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            height: 100%;
        }

        .hub-btn {
            background: var(--card-bg);
            border: 2px solid var(--main-green);
            color: var(--main-green);
            padding: 30px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            font-family: inherit;
        }

        .hub-btn:active {
            background: var(--dark-green);
        }

        /* Кнопка "Назад" */
        .back-btn {
            background: none;
            border: 1px solid var(--dark-green);
            color: var(--dark-green);
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            width: fit-content;
            cursor: pointer;
        }

        /* Секции (по умолчанию скрыты) */
        .screen { display: none; flex-direction: column; height: 100%; }
        .active-screen { display: flex; }

        /* Копируем стили дневника из прошлого шага */
        .tabs { display: flex; justify-content: space-around; margin-bottom: 15px; border-bottom: 1px solid var(--dark-green); }
        .tab-btn { background: none; border: none; color: var(--dark-green); font-size: 18px; padding: 10px; }
        .tab-btn.active { color: var(--main-green); border-bottom: 2px solid var(--main-green); }
        #schedule-list { flex-grow: 1; overflow-y: auto; }
        .lesson-card { background: var(--card-bg); border: 1px solid var(--dark-green); border-radius: 12px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .lesson-room { border: 1px solid var(--main-green); padding: 5px 10px; border-radius: 4px; color: #fff; }

        /* Стили для ГДЗ */
        .gdz-list { display: flex; flex-direction: column; gap: 15px; }
        .gdz-link {
            background: var(--dark-green);
            color: var(--main-green);
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            text-align: center;
            border: 1px solid var(--main-green);
        }

        #settings-btn { position: absolute; top: 10px; right: 10px; background: none; border: 1px solid var(--dark-green); color: var(--dark-green); padding: 5px; border-radius: 5px; font-size: 12px; }

    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <h1 style="text-align: center;">TERMINAL</h1>
        <div class="menu-grid">
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 ЩОДЕННИК</button>
            <button class="hub-btn" onclick="showScreen('gdz-screen')">🔍 ГДЗ</button>
        </div>
    </div>

    <div id="diary-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД</button>
        <button id="settings-btn" onclick="toggleEdit()">⚙</button>
        
        <div id="diary-view">
            <div class="tabs">
                <button class="tab-btn active" onclick="setDay(0)">ПН</button>
                <button class="tab-btn" onclick="setDay(1)">ВТ</button>
                <button class="tab-btn" onclick="setDay(2)">СР</button>
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button>
                <button class="tab-btn" onclick="setDay(4)">ПТ</button>
            </div>
            <div id="schedule-list"></div>
        </div>

        <div id="diary-edit" style="display:none; flex-direction: column; gap: 10px;">
            <h3 style="margin:0">РЕДАКТОР</h3>
            <select id="lesson-day" style="background:#0a0a0a; color:#00ff41; padding:10px; border:1px solid var(--dark-green);">
                <option value="0">Понедельник</option>
                <option value="1">Вторник</option>
                <option value="2">Среда</option>
                <option value="3">Четверг</option>
                <option value="4">Пятница</option>
            </select>
            <input type="text" id="lesson-name" placeholder="Предмет" style="background:#0a0a0a; color:#00ff41; padding:10px; border:1px solid var(--dark-green);">
            <input type="text" id="lesson-room" placeholder="Кабинет" style="background:#0a0a0a; color:#00ff41; padding:10px; border:1px solid var(--dark-green);">
            <button onclick="addLesson()" style="padding:15px; background:var(--main-green); color:#000; border:none; font-weight:bold;">ДОБАВИТЬ</button>
            <div id="edit-list" style="margin-top:10px; overflow-y:auto; max-height: 200px;"></div>
        </div>
    </div>

    <div id="gdz-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД</button>
        <h2 style="text-align: center;">ОТВЕТЫ</h2>
        <div class="gdz-list">
            <a href="https://vshkole.com" target="_blank" class="gdz-link">1. VSHKOLE</a>
            <a href="https://gdzonline.net/882-workbook-6-kosta.html" target="_blank" class="gdz-link">2. АНГЛ (Workbook)</a>
            <a href="https://gdzonline.net/311-ukrayinska-mova-6-klas-zabolotniy.html" target="_blank" class="gdz-link">3. УКР МОВА</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [[],[],[],[],[]];
        let currentDayView = 0;

        // Навигация между экранами
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            if(screenId === 'diary-screen') renderSchedule();
        }

        // Логика дневника (как раньше)
        function renderSchedule() {
            const listObj = document.getElementById('schedule-list');
            listObj.innerHTML = '';
            const dayLessons = schedule[currentDayView];
            if (dayLessons.length === 0) {
                listObj.innerHTML = '<div style="text-align:center; margin-top:50px; color:#003300">Пусто...</div>';
                return;
            }
            dayLessons.forEach((lesson, index) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `<div><div style="font-size:12px;color:#003300">Урок ${index+1}</div><div>${lesson.name}</div></div><div class="lesson-room">${lesson.room}</div>`;
                listObj.appendChild(card);
            });
        }

        function setDay(dayIndex) {
            currentDayView = dayIndex;
            document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                btn.className = (idx === dayIndex) ? 'tab-btn active' : 'tab-btn';
            });
            renderSchedule();
        }

        function toggleEdit() {
            const v = document.getElementById('diary-view');
            const e = document.getElementById('diary-edit');
            if(v.style.display === 'none') {
                v.style.display = 'block'; e.style.display = 'none';
                renderSchedule();
            } else {
                v.style.display = 'none'; e.style.display = 'flex';
                renderEditList();
            }
        }

        function addLesson() {
            const d = document.getElementById('lesson-day').value;
            const n = document.getElementById('lesson-name').value;
            const r = document.getElementById('lesson-room').value;
            if(n && r) {
                schedule[d].push({name: n, room: r});
                localStorage.setItem('mySchedule', JSON.stringify(schedule));
                document.getElementById('lesson-name').value = '';
                document.getElementById('lesson-room').value = '';
                renderEditList();
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = '';
            schedule.forEach((day, dIdx) => {
                day.forEach((l, lIdx) => {
                    const item = document.createElement('div');
                    item.style.display = 'flex';
                    item.style.justifyContent = 'space-between';
                    item.style.padding = '5px';
                    item.innerHTML = `<span>${l.name}</span><button onclick="deleteLesson(${dIdx},${lIdx})" style="color:red; background:none; border:none;">[X]</button>`;
                    list.appendChild(item);
                });
            });
        }

        function deleteLesson(d, l) {
            schedule[d].splice(l, 1);
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            renderEditList();
        }

        tg.ready();
    </script>
</body>
</html>
