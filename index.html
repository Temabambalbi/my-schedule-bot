<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>School Terminal v8.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-color: #00ff41;
            --card-bg: #0a0a0a;
            --text-color: #00ff41;
        }

        html, body {
            position: fixed; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.3s; /* Плавная смена цветов */
        }

        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; color: var(--text-color); }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .active-screen { display: flex; }

        /* Шапка */
        .header { text-align: center; border-bottom: 1px solid var(--main-color); margin-bottom: 20px; padding-bottom: 10px; }
        
        /* Кнопки */
        .hub-btn {
            background: var(--card-bg); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 18px; margin-bottom: 10px;
            font-size: 15px; font-weight: bold; border-radius: 12px; font-family: inherit;
            text-align: center; cursor: pointer; text-transform: uppercase;
        }

        .back-btn {
            background: var(--main-color); color: var(--bg-color);
            border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px;
        }

        /* Список уроков */
        #schedule-list { flex-grow: 1; overflow-y: auto; padding-bottom: 50px; }
        .lesson-card { 
            background: var(--card-bg); border: 1px solid var(--main-color); 
            border-radius: 10px; padding: 12px; margin-bottom: 10px; 
        }

        /* Поля ввода */
        textarea, input {
            background: #000; border: 1px solid var(--main-color);
            color: var(--main-color); padding: 12px; border-radius: 8px;
            width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit;
        }

        /* Селектор тем */
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .theme-btn { padding: 15px; border-radius: 10px; border: 2px solid; text-align: center; font-weight: bold; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <div class="header">
            <h1 style="margin:0; letter-spacing: 3px;">SYSTEM HUB</h1>
            <div style="font-size: 10px; opacity: 0.6;">MULTI-COLOR OVERRIDE</div>
        </div>
        
        <div style="display: flex; flex-direction: column; justify-content: center; height: 100%;">
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 МІЙ ЩОДЕННИК</button>
            <button class="hub-btn" style="border-style: dashed;" onclick="showScreen('import-screen')">⚡ ІМПОРТ З E-SCHOOL</button>
            <button class="hub-btn" onclick="showScreen('settings-screen')">⚙️ НАЛАШТУВАННЯ ТЕМ</button>
        </div>
    </div>

    <div id="diary-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД</button>
        <div id="schedule-list"></div>
        <button class="hub-btn" style="font-size: 12px;" onclick="showScreen('manual-edit')">⚙️ РУЧНЕ РЕДАГУВАННЯ</button>
    </div>

    <div id="import-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← ВІДМІНА</button>
        <h3 style="margin:0 0 10px 0;">DATA INTERCEPT</h3>
        <textarea id="raw-data" placeholder="Встав текст з ЕШ сюди..."></textarea>
        <button class="hub-btn" style="width:100%" onclick="magicImport()">МАГІЧНИЙ ІМПОРТ ✨</button>
    </div>

    <div id="settings-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД</button>
        <h3>ОБЕРИ КОЛІР СИСТЕМИ:</h3>
        <div class="theme-grid">
            <div class="theme-btn" style="border-color: #00ff41; color: #00ff41;" onclick="setTheme('green')">MATRIX</div>
            <div class="theme-btn" style="border-color: #0077ff; color: #0077ff;" onclick="setTheme('blue')">CYBER</div>
            <div class="theme-btn" style="border-color: #ff0000; color: #ff0000;" onclick="setTheme('red')">ALARM</div>
            <div class="theme-btn" style="border-color: #888888; color: #888888;" onclick="setTheme('gray')">STEALTH</div>
            <div class="theme-btn" style="border-color: #000; color: #000; background: #fff; grid-column: span 2;" onclick="setTheme('light')">LIGHT MODE</div>
        </div>
        <button class="hub-btn" style="margin-top:20px; border-color:red; color:red;" onclick="clearAll()">🧨 ОЧИСТИТИ ВСІ ДАНІ</button>
    </div>

    <div id="manual-edit" class="screen">
        <button class="back-btn" onclick="showScreen('diary-screen')">← ЗБЕРЕГТИ</button>
        <input type="text" id="m-name" placeholder="Назва уроку">
        <input type="text" id="m-hw" placeholder="Завдання">
        <button class="hub-btn" style="width:100%" onclick="addManual()">+ ДОДАТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let myData = JSON.parse(localStorage.getItem('terminal_data')) || [];

        // --- ТЕМЫ ---
        const themes = {
            green: { main: '#00ff41', bg: '#000000', card: '#0a0a0a' },
            blue: { main: '#0077ff', bg: '#000000', card: '#000815' },
            red: { main: '#ff0000', bg: '#000000', card: '#0a0000' },
            gray: { main: '#888888', bg: '#000000', card: '#111111' },
            light: { main: '#000000', bg: '#ffffff', card: '#f2f2f2' }
        };

        function setTheme(name) {
            const t = themes[name];
            document.documentElement.style.setProperty('--main-color', t.main);
            document.documentElement.style.setProperty('--bg-color', t.bg);
            document.documentElement.style.setProperty('--card-bg', t.card);
            document.documentElement.style.setProperty('--text-color', t.main);
            localStorage.setItem('terminal_theme', name);
            tg.HapticFeedback.impactOccurred('medium');
        }

        // Загрузка темы при старте
        setTheme(localStorage.getItem('terminal_theme') || 'green');

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'diary-screen') renderList();
        }

        function magicImport() {
            const text = document.getElementById('raw-data').value;
            if(!text) return;
            const lines = text.split('\n');
            let found = [];
            lines.forEach(line => {
                if(line.trim().length > 3) {
                    let parts = line.split('\t');
                    found.push({ name: parts[0].trim().substring(0, 25), hw: parts[1] ? parts[1].trim() : "Немає ДЗ" });
                }
            });
            if(found.length > 0) { myData = found; save(); showScreen('diary-screen'); tg.HapticFeedback.notificationOccurred('success'); }
        }

        function addManual() {
            const n = document.getElementById('m-name').value;
            const h = document.getElementById('m-hw').value;
            if(n) { myData.push({name: n, hw: h || "Немає"}); save(); document.getElementById('m-name').value = ''; document.getElementById('m-hw').value = ''; }
        }

        function renderList() {
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';
            myData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `<b style="text-transform:uppercase">${item.name}</b><div style="font-size:12px; margin-top:5px; opacity:0.8">${item.hw}</div>`;
                container.appendChild(card);
            });
        }

        function save() { localStorage.setItem('terminal_data', JSON.stringify(myData)); }
        function clearAll() { if(confirm("Видалити дані?")) { myData = []; save(); showScreen('main-menu'); } }

        tg.ready();
    </script>
</body>
</html>
