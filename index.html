<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Terminal v4.0 Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-color: #00ff41;
            --card-bg: #0a0a0a;
            --text-color: #00ff41;
        }

        html, body {
            position: fixed; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.3s;
        }

        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; color: var(--text-color); }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .active-screen { display: flex; }

        .control-panel { display: flex; gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
        .back-btn {
            background: var(--main-color); color: var(--bg-color);
            border: none; padding: 12px; border-radius: 10px;
            flex-grow: 1; font-weight: bold; font-family: inherit;
        }

        .menu-grid { display: flex; flex-direction: column; gap: 12px; height: 100%; justify-content: center; }
        .hub-btn {
            background: var(--card-bg); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 25px 20px;
            font-size: 18px; font-weight: bold; border-radius: 15px; font-family: inherit;
            text-align: center; cursor: pointer;
        }

        .es-btn { border-color: #0077ff; color: #0077ff; }

        /* Окно для E-School */
        #es-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
            background: white; /* Сайт ЭШ белый, так будет лучше видно */
        }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 10px; border-bottom: 1px solid var(--main-color); }
        .tab-btn { background: none; border: none; color: var(--main-color); font-size: 16px; padding: 10px; font-family: inherit; opacity: 0.4; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--main-color); }
        
        #schedule-list { flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .lesson-card { background: var(--card-bg); border: 1px solid var(--main-color); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .hw-input { background: transparent; border: 1px solid var(--main-color); color: var(--text-color); padding: 10px; width: 100%; box-sizing: border-box; margin-top: 10px; font-family: inherit; border-radius: 6px; }
        .edit-input { background: var(--card-bg); color: var(--main-color); padding: 12px; border: 1px solid var(--main-color); width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <h1 style="text-align: center; letter-spacing: 5px;">SYSTEM HUB</h1>
        <div class="menu-grid">
            <div class="hub-btn" onclick="showScreen('diary-screen')">📂 МІЙ ЩОДЕННИК</div>
            <div class="hub-btn es-btn" onclick="showScreen('es-screen')">🔐 ВХІД E-SCHOOL (IN-APP)</div>
            <div class="hub-btn" onclick="showScreen('gdz-screen')">🔍 ГДЗ</div>
            <div class="hub-btn" style="opacity: 0.6; font-size: 14px;" onclick="showScreen('settings-screen')">⚙️ ТЕМИ</div>
        </div>
    </div>

    <div id="es-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← ВИЙТИ В МЕНЮ</button>
        </div>
        <iframe src="https://eschool-ua.com/" id="es-frame"></iframe>
    </div>

    <div id="diary-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
            <button id="edit-toggle-btn" style="background: transparent; color: var(--main-color); border: 1px solid var(--main-color); border-radius: 10px; padding: 0 15px;" onclick="toggleEdit()">РЕД.</button>
        </div>
        <div id="diary-view" style="display: flex; flex-direction: column; height: 100%;">
            <div class="tabs">
                <button class="tab-btn active" onclick="setDay(0)">ПН</button>
                <button class="tab-btn" onclick="setDay(1)">ВТ</button>
                <button class="tab-btn" onclick="setDay(2)">СР</button>
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button>
                <button class="tab-btn" onclick="setDay(4)">ПТ</button>
            </div>
            <div id="schedule-list"></div>
        </div>
        <div id="diary-edit" style="display:none; flex-direction: column; overflow-y: auto;">
            <select id="lesson-day" class="edit-input">
                <option value="0">Понеділок</option><option value="1">Вівторок</option>
                <option value="2">Середа</option><option value="3">Четвер</option><option value="4">П'ятниця</option>
            </select>
            <input type="text" id="lesson-name" class="edit-input" placeholder="Предмет">
            <input type="text" id="lesson-room" class="edit-input" placeholder="Каб.">
            <button onclick="addLesson()" style="padding:15px; background:var(--main-color); color:var(--bg-color); border:none; font-weight:bold; border-radius:10px;">+ ДОДАТИ</button>
            <div id="edit-list" style="margin-top:20px; padding-bottom: 100px;"></div>
        </div>
    </div>

    <div id="gdz-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <div class="menu-grid">
            <div class="hub-btn" onclick="window.open('https://vshkole.com', '_blank')">VSHKOLE.COM</div>
            <div class="hub-btn" onclick="window.open('https://gdzonline.net', '_blank')">GDZONLINE.NET</div>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="hub-btn" style="border-color:#00ff41; color:#00ff41;" onclick="setTheme('green')">MATRIX GREEN</div>
            <div class="hub-btn" style="border-color:#0077ff; color:#0077ff;" onclick="setTheme('blue')">CYBER BLUE</div>
            <div class="hub-btn" style="border-color:#ff0000; color:#ff0000;" onclick="setTheme('red')">ALARM RED</div>
            <div class="hub-btn" style="border-color:#888; color:#888;" onclick="setTheme('gray')">DARK GRAY</div>
            <div class="hub-btn" style="border-color:#000; color:#000; background:#fff;" onclick="setTheme('light')">LIGHT MODE</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [[],[],[],[],[]];
        let currentDayView = 0;

        const themes = {
            green: { main: '#00ff41', bg: '#000000', card: '#0a0a0a', text: '#00ff41' },
            blue: { main: '#0077ff', bg: '#000000', card: '#000815', text: '#0077ff' },
            red: { main: '#ff0000', bg: '#000000', card: '#0a0000', text: '#ff0000' },
            gray: { main: '#888', bg: '#000000', card: '#111', text: '#888' },
            light: { main: '#000', bg: '#fff', card: '#f2f2f2', text: '#000' }
        };

        function setTheme(name) {
            const t = themes[name];
            document.documentElement.style.setProperty('--main-color', t.main);
            document.documentElement.style.setProperty('--bg-color', t.bg);
            document.documentElement.style.setProperty('--card-bg', t.card);
            document.documentElement.style.setProperty('--text-color', t.text);
            localStorage.setItem('selectedTheme', name);
            tg.HapticFeedback.impactOccurred('light');
        }

        const savedTheme = localStorage.getItem('selectedTheme') || 'green';
        setTheme(savedTheme);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'diary-screen') renderSchedule();
        }

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            const lessons = schedule[currentDayView];
            if (lessons.length === 0) { list.innerHTML = '<div style="text-align:center;margin-top:40px;opacity:0.3;">ПОРОЖНЬО</div>'; return; }
            lessons.forEach((l, i) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;">
                        <div><small style="opacity:0.5">${i+1} УРОК</small><br><b>${l.name}</b></div>
                        <div style="border:1px solid var(--main-color);padding:4px;border-radius:5px;font-size:12px;">каб. ${l.room}</div>
                    </div>
                    <input type="text" class="hw-input" placeholder="Домашка..." value="${l.hw || ''}" onchange="saveHW(${currentDayView},${i},this.value)">
                `;
                list.appendChild(card);
            });
        }

        function saveHW(d, i, v) {
            schedule[d][i].hw = v;
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
        }

        function setDay(i) {
            currentDayView = i;
            document.querySelectorAll('.tab-btn').forEach((b, idx) => b.className = idx === i ? 'tab-btn active' : 'tab-btn');
            renderSchedule();
        }

        function toggleEdit() {
            const v = document.getElementById('diary-view');
            const e = document.getElementById('diary-edit');
            const btn = document.getElementById('edit-toggle-btn');
            if(v.style.display === 'none') {
                v.style.display = 'flex'; e.style.display = 'none'; btn.innerText = 'РЕД.'; renderSchedule();
            } else {
                v.style.display = 'none'; e.style.display = 'flex'; btn.innerText = 'ОК'; renderEditList();
            }
        }

        function addLesson() {
            const d = document.getElementById('lesson-day').value;
            const n = document.getElementById('lesson-name').value.trim();
            const r = document.getElementById('lesson-room').value.trim();
            if(n && r) {
                schedule[d].push({name: n, room: r, hw: ''});
                localStorage.setItem('mySchedule', JSON.stringify(schedule));
                document.getElementById('lesson-name').value = '';
                document.getElementById('lesson-room').value = '';
                renderEditList();
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = '<h4>РЕДАГУВАННЯ:</h4>';
            const days = ['ПН','ВТ','СР','ЧТ','ПТ'];
            schedule.forEach((day, dIdx) => {
                day.forEach((l, lIdx) => {
                    const item = document.createElement('div');
                    item.style = 'display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333;font-size:14px;';
                    item.innerHTML = `<span>${days[dIdx]}: ${l.name}</span><button onclick="deleteLesson(${dIdx},${lIdx})" style="color:red;background:none;border:none;">[X]</button>`;
                    list.appendChild(item);
                });
            });
        }

        function deleteLesson(d, l) {
            schedule[d].splice(l, 1);
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            renderEditList();
        }

        let today = new Date().getDay();
        currentDayView = (today === 0 || today === 6) ? 0 : today - 1;
        setDay(currentDayView);
        tg.ready();
    </script>
</body>
</html>
