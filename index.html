<!DOCTYPE html> 
<html lang="uk"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> 
    <title>SYSTEM</title> 

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://telegram.org/js/telegram-web-app.js"></script> 
    <style> 
        :root { 
            --bg-color: #000000; 
            --main-color: #00ff41; 
        } 

        html, body { 
            position: fixed; width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); margin: 0; padding: 0;
            font-family: monospace; transition: 0.3s; 
        } 

        body { 
            display: flex; flex-direction: column; padding: 15px; 
            padding-top: calc(env(safe-area-inset-top) + 10px); 
            box-sizing: border-box; color: var(--main-color); 
        } 

        .control-panel { display: flex; gap: 10px; margin-bottom: 20px; flex-shrink: 0; } 
        .back-btn { background: var(--main-color); color: var(--bg-color); border: none; padding: 15px; border-radius: 5px; flex-grow: 1; font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase;} 

        .menu-grid { display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center; } 
        .hub-btn { background: transparent; border: 2px solid var(--main-color); color: var(--main-color); padding: 25px; font-size: 18px; font-weight: bold; border-radius: 5px; font-family: inherit; cursor: pointer; text-transform: uppercase; text-align: left;} 

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; } 
        .active-screen { display: flex; } 

        #gdz-browser { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; flex-direction: column;
        }
        #gdz-frame { border: none; width: 100%; flex-grow: 1; }
        .browser-bar { background: #111; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--main-color); }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 10px; border-bottom: 1px solid var(--main-color); flex-shrink: 0; } 
        .tab-btn { background: none; border: none; color: var(--main-color); font-size: 16px; padding: 10px; font-family: inherit; opacity: 0.5; } 
        .tab-btn.active { opacity: 1; font-weight: bold; border-bottom: 2px solid var(--main-color); } 
        
        #schedule-list { flex-grow: 1; overflow-y: auto; padding-bottom: 50px; } 
        .lesson-card { border-bottom: 1px solid var(--main-color); padding: 15px; } 
        .hw-input { background: transparent; border: 1px dashed var(--main-color); color: #fff; padding: 8px; width: 100%; box-sizing: border-box; margin-top: 10px; font-family: inherit; } 

        .gdz-list { display: flex; flex-direction: column; gap: 10px; } 
        .gdz-link-btn { background: transparent; color: var(--main-color); padding: 20px; border-radius: 5px; text-align: center; border: 1px solid var(--main-color); font-weight: bold; text-transform: uppercase; cursor: pointer;} 

        .theme-selector { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .theme-opt { padding: 15px; border-radius: 5px; border: 2px solid; font-weight: bold; text-align: center; cursor: pointer; text-transform: uppercase;} 
        
        .edit-input { background: transparent; color: var(--main-color); padding: 12px; border: 1px solid var(--main-color); width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 5px; } 
    </style> 
</head> 
<body> 

    <div id="gdz-browser">
        <div class="browser-bar">
            <span id="browser-title" style="font-size: 10px;">BROWSER</span>
            <button onclick="closeBrowser()" style="background: var(--main-color); border: none; color: #000; padding: 5px 10px; font-weight: bold;">CLOSE X</button>
        </div>
        <iframe id="gdz-frame" src="" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
    </div>

    <div id="main-menu" class="screen active-screen"> 
        <h1 style="text-align: center; letter-spacing: 8px; font-weight: normal;">SYSTEM</h1> 
        <div class="menu-grid"> 
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 ЩОДЕННИК</button> 
            <button class="hub-btn" onclick="showScreen('gdz-screen')">🔍 ГДЗ ПОРТАЛ</button> 
            <button class="hub-btn" onclick="showScreen('settings-screen')">⚙️ ТЕМИ SYSTEM</button> 
        </div> 
    </div> 

    <div id="diary-screen" class="screen"> 
        <div class="control-panel"> 
            <button class="back-btn" onclick="showScreen('main-menu')">← BACK</button> 
            <button id="edit-toggle-btn" style="background: transparent; color: var(--main-color); border: 1px solid var(--main-color); border-radius: 5px; padding: 0 15px;" onclick="toggleEdit()">EDIT</button> 
        </div> 
        <div id="diary-view" style="display: flex; flex-direction: column; height: 100%;"> 
            <div class="tabs"> 
                <button class="tab-btn active" onclick="setDay(0)">ПН</button> 
                <button class="tab-btn" onclick="setDay(1)">ВТ</button> 
                <button class="tab-btn" onclick="setDay(2)">СР</button> 
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button> 
                <button class="tab-btn" onclick="setDay(4)">ПТ</button> 
            </div> 
            <div id="schedule-list"></div> 
        </div> 
        <div id="diary-edit" style="display:none; flex-direction: column;"> 
            <select id="lesson-day" class="edit-input"> 
                <option value="0">Пн</option><option value="1">Вт</option><option value="2">Ср</option><option value="3">Чт</option><option value="4">Пт</option> 
            </select> 
            <input type="text" id="lesson-name" class="edit-input" placeholder="Предмет"> 
            <input type="text" id="lesson-room" class="edit-input" placeholder="Кабінет"> 
            <button onclick="addLesson()" style="padding:15px; background:var(--main-color); color:var(--bg-color); border:none; font-weight:bold;">+ ADD</button> 
            <div id="edit-list" style="margin-top:20px; overflow-y: auto;"></div> 
        </div> 
    </div> 

    <div id="gdz-screen" class="screen"> 
        <div class="control-panel"> 
            <button class="back-btn" onclick="showScreen('main-menu')">← BACK</button> 
        </div> 
        <div class="gdz-list"> 
            <div class="gdz-link-btn" onclick="openBrowser('https://vshkole.com')">VSHKOLE (IN-APP)</div> 
            <div class="gdz-link-btn" onclick="window.open('https://gdzonline.net', '_blank')">GDZONLINE (EXTERNAL)</div> 
        </div> 
    </div> 

    <div id="settings-screen" class="screen"> 
        <div class="control-panel"> 
            <button class="back-btn" onclick="showScreen('main-menu')">← BACK</button> 
        </div> 
        <div class="theme-selector"> 
            <div class="theme-opt" style="border-color: #00ff41; color: #00ff41;" onclick="setTheme('green')">MATRIX GREEN</div> 
            <div class="theme-opt" style="border-color: #0077ff; color: #0077ff;" onclick="setTheme('blue')">CYBER BLUE</div> 
            <div class="theme-opt" style="border-color: #ff0000; color: #ff0000;" onclick="setTheme('red')">ALARM RED</div> 
            <div class="theme-opt" style="border-color: #888888; color: #888888;" onclick="setTheme('gray')">DARK GRAY</div> 
            <div class="theme-opt" style="border-color: #ffffff; color: #ffffff;" onclick="setTheme('white')">PURE WHITE</div> 
        </div> 
    </div> 

    <script> 
        const tg = window.Telegram.WebApp; 
        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [[],[],[],[],[]]; 
        let currentDayView = 0; 

        const themes = { 
            green: { main: '#00ff41' }, 
            blue: { main: '#0077ff' }, 
            red: { main: '#ff0000' }, 
            gray: { main: '#888888' }, 
            white: { main: '#ffffff' } 
        }; 

        function setTheme(name) { 
            const theme = themes[name]; 
            document.documentElement.style.setProperty('--main-color', theme.main); 
            localStorage.setItem('selectedTheme', name); 
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        } 
        setTheme(localStorage.getItem('selectedTheme') || 'green');

        function showScreen(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); 
            document.getElementById(id).classList.add('active-screen'); 
            if(id === 'diary-screen') renderSchedule(); 
        } 

        function openBrowser(url) {
            document.getElementById('gdz-frame').src = url;
            document.getElementById('gdz-browser').style.display = 'flex';
        }

        function closeBrowser() {
            document.getElementById('gdz-browser').style.display = 'none';
            document.getElementById('gdz-frame').src = '';
        }

        function renderSchedule() { 
            const list = document.getElementById('schedule-list'); 
            list.innerHTML = ''; 
            const lessons = schedule[currentDayView]; 
            if (lessons.length === 0) { list.innerHTML = '<div style="text-align:center;margin-top:50px;opacity:0.3">_EMPTY_DATA</div>'; return; } 
            lessons.forEach((l, i) => { 
                const card = document.createElement('div'); 
                card.className = 'lesson-card'; 
                card.innerHTML = `<b>${i+1}. ${l.name}</b> [${l.room}]<input type="text" class="hw-input" placeholder="Homework..." value="${l.hw || ''}" onchange="saveHW(${currentDayView},${i},this.value)">`; 
                list.appendChild(card); 
            }); 
        } 

        function saveHW(d, i, v) { 
            schedule[d][i].hw = v; 
            localStorage.setItem('mySchedule', JSON.stringify(schedule)); 
        } 

        function setDay(i) { 
            currentDayView = i; 
            document.querySelectorAll('.tab-btn').forEach((b, idx) => b.className = idx === i ? 'tab-btn active' : 'tab-btn'); 
            renderSchedule(); 
        } 

        function toggleEdit() { 
            const v = document.getElementById('diary-view'); 
            const e = document.getElementById('diary-edit'); 
            if(v.style.display === 'none') { v.style.display = 'flex'; e.style.display = 'none'; renderSchedule(); } 
            else { v.style.display = 'none'; e.style.display = 'flex'; renderEditList(); } 
        } 

        function addLesson() { 
            const d = document.getElementById('lesson-day').value; 
            const n = document.getElementById('lesson-name').value; 
            const r = document.getElementById('lesson-room').value; 
            if(n) { schedule[d].push({name: n, room: r, hw: ''}); localStorage.setItem('mySchedule', JSON.stringify(schedule)); renderEditList(); } 
        } 

        function renderEditList() { 
            const list = document.getElementById('edit-list'); 
            list.innerHTML = ''; 
            const d = document.getElementById('lesson-day').value;
            schedule[d].forEach((l, i) => { 
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;"><span>${l.name}</span><button onclick="deleteLesson(${d},${i})" style="color:red; background:none; border:none;">[DELETE]</button></div>`; 
            }); 
        } 

        function deleteLesson(d, i) { schedule[d].splice(i, 1); localStorage.setItem('mySchedule', JSON.stringify(schedule)); renderEditList(); } 

        tg.ready(); 
        tg.expand();
    </script> 
</body> 
</html>
