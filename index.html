<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>School Terminal v2.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-green: #00ff41;
            --dark-green: #003300;
            --card-bg: #0a0a0a;
            --hw-text: #00ccff; /* Голубоватый для ДЗ, чтобы выделялся на зеленом */
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--main-green);
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Панель управления (Назад + Настройки) */
        .control-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .back-btn {
            background: var(--main-green);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            flex-grow: 1;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
        }

        #settings-btn {
            background: var(--dark-green);
            border: 2px solid var(--main-green);
            color: var(--main-green);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        /* Главное меню */
        .menu-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            justify-content: center; 
            height: 100%; 
        }

        .hub-btn {
            background: var(--card-bg);
            border: 2px solid var(--main-green);
            color: var(--main-green);
            padding: 40px 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            text-align: center;
            font-family: inherit;
        }

        /* Секции */
        .screen { display: none; flex-direction: column; height: 100%; }
        .active-screen { display: flex; }

        /* Вкладки */
        .tabs { display: flex; justify-content: space-around; margin-bottom: 15px; border-bottom: 1px solid var(--dark-green); }
        .tab-btn { background: none; border: none; color: var(--dark-green); font-size: 18px; padding: 10px; font-family: inherit; }
        .tab-btn.active { color: var(--main-green); border-bottom: 2px solid var(--main-green); }

        /* Карточка урока */
        .lesson-card {
            background: var(--card-bg);
            border: 1px solid var(--dark-green);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lesson-main { display: flex; justify-content: space-between; align-items: center; }
        .lesson-room { border: 1px solid var(--main-green); padding: 5px 10px; border-radius: 6px; color: #fff; font-size: 18px; font-weight: bold; }

        /* ДЗ поле */
        .hw-area {
            border-top: 1px dashed var(--dark-green);
            padding-top: 10px;
        }

        .hw-input {
            background: #000;
            border: 1px solid #1a1a1a;
            color: var(--hw-text);
            padding: 10px;
            font-family: inherit;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* ГДЗ ссылки */
        .gdz-list { display: flex; flex-direction: column; gap: 15px; }
        .gdz-link {
            background: var(--card-bg);
            color: var(--main-green);
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            border: 1px solid var(--main-green);
            font-size: 18px;
            font-weight: bold;
        }

        /* Скролл */
        #schedule-list { flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }

        /* Поля ввода в настройках */
        .edit-input {
            background: #0a0a0a;
            color: var(--main-green);
            padding: 12px;
            border: 1px solid var(--dark-green);
            font-family: inherit;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <h1 style="text-align: center; letter-spacing: 5px; margin-top: 40px;">HUB</h1>
        <div class="menu-grid">
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 ЩОДЕННИК</button>
            <button class="hub-btn" onclick="showScreen('gdz-screen')">🔍 ГДЗ</button>
        </div>
    </div>

    <div id="diary-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← НАЗАД В МЕНЮ</button>
            <button id="settings-btn" onclick="toggleEdit()">⚙</button>
        </div>
        
        <div id="diary-view">
            <div class="tabs">
                <button class="tab-btn active" onclick="setDay(0)">ПН</button>
                <button class="tab-btn" onclick="setDay(1)">ВТ</button>
                <button class="tab-btn" onclick="setDay(2)">СР</button>
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button>
                <button class="tab-btn" onclick="setDay(4)">ПТ</button>
            </div>
            <div id="schedule-list"></div>
        </div>

        <div id="diary-edit" style="display:none; flex-direction: column; gap: 12px; overflow-y: auto;">
            <h3 style="text-align:center; margin: 0;">НАСТРОЙКИ</h3>
            <select id="lesson-day" class="edit-input">
                <option value="0">Понедельник</option>
                <option value="1">Вторник</option>
                <option value="2">Среда</option>
                <option value="3">Четверг</option>
                <option value="4">Пятница</option>
            </select>
            <input type="text" id="lesson-name" class="edit-input" placeholder="Название урока">
            <input type="text" id="lesson-room" class="edit-input" placeholder="Кабинет">
            <button onclick="addLesson()" style="padding:15px; background:var(--main-green); color:#000; border:none; font-weight:bold; border-radius:8px; font-family: inherit;">+ ДОБАВИТЬ УРОК</button>
            
            <div id="edit-list" style="margin-top:20px;">
                </div>
        </div>
    </div>

    <div id="gdz-screen" class="screen">
        <button class="back-btn" style="margin-bottom: 30px;" onclick="showScreen('main-menu')">← НАЗАД В МЕНЮ</button>
        <div class="gdz-list">
            <a href="https://vshkole.com" target="_blank" class="gdz-link">VSHKOLE.COM</a>
            <a href="https://gdzonline.net/882-workbook-6-kosta.html" target="_blank" class="gdz-link">АНГЛ (WORKBOOK)</a>
            <a href="https://gdzonline.net/311-ukrayinska-mova-6-klas-zabolotniy.html" target="_blank" class="gdz-link">УКР МОВА</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        // Данные
        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [[],[],[],[],[]];
        let currentDayView = 0;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            if(screenId === 'diary-screen') {
                document.getElementById('diary-view').style.display = 'block';
                document.getElementById('diary-edit').style.display = 'none';
                renderSchedule();
            }
        }

        function renderSchedule() {
            const listObj = document.getElementById('schedule-list');
            listObj.innerHTML = '';
            const dayLessons = schedule[currentDayView];

            if (dayLessons.length === 0) {
                listObj.innerHTML = '<div style="text-align:center; margin-top:50px; color:#003300">Список пуст...</div>';
                return;
            }

            dayLessons.forEach((lesson, index) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div class="lesson-main">
                        <div>
                            <div style="font-size:11px;color:#003300">УРОК ${index+1}</div>
                            <div style="font-size:19px; font-weight:bold;">${lesson.name}</div>
                        </div>
                        <div class="lesson-room">${lesson.room}</div>
                    </div>
                    <div class="hw-area">
                        <input type="text" class="hw-input" placeholder="Записать ДЗ..." 
                            value="${lesson.hw || ''}" 
                            onchange="saveHW(${currentDayView}, ${index}, this.value)">
                    </div>
                `;
                listObj.appendChild(card);
            });
        }

        function saveHW(dayIdx, lessonIdx, val) {
            schedule[dayIdx][lessonIdx].hw = val;
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            tg.HapticFeedback.impactOccurred('light');
        }

        function setDay(idx) {
            currentDayView = idx;
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.className = (i === idx) ? 'tab-btn active' : 'tab-btn';
            });
            renderSchedule();
        }

        function toggleEdit() {
            const v = document.getElementById('diary-view');
            const e = document.getElementById('diary-edit');
            if(v.style.display === 'none') {
                v.style.display = 'block'; e.style.display = 'none';
                renderSchedule();
            } else {
                v.style.display = 'none'; e.style.display = 'flex';
                renderEditList();
            }
        }

        function addLesson() {
            const d = document.getElementById('lesson-day').value;
            const n = document.getElementById('lesson-name').value.trim();
            const r = document.getElementById('lesson-room').value.trim();
            if(n && r) {
                schedule[d].push({name: n, room: r, hw: ''});
                localStorage.setItem('mySchedule', JSON.stringify(schedule));
                document.getElementById('lesson-name').value = '';
                document.getElementById('lesson-room').value = '';
                renderEditList();
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = '<h4 style="border-bottom: 1px solid var(--dark-green); padding-bottom:5px;">УДАЛИТЬ УРОКИ:</h4>';
            schedule.forEach((day, dIdx) => {
                const days = ['ПН','ВТ','СР','ЧТ','ПТ'];
                day.forEach((l, lIdx) => {
                    const item = document.createElement('div');
                    item.style.display = 'flex';
                    item.style.justifyContent = 'space-between';
                    item.style.padding = '12px 5px';
                    item.style.borderBottom = '1px solid #111';
                    item.innerHTML = `<span><small>${days[dIdx]}:</small> ${l.name}</span><button onclick="deleteLesson(${dIdx},${lIdx})" style="color:#ff4444; background:none; border:none; font-family:inherit;">[УДАЛИТЬ]</button>`;
                    list.appendChild(item);
                });
            });
        }

        function deleteLesson(d, l) {
            schedule[d].splice(l, 1);
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            renderEditList();
        }

        // Авто-определение дня при старте
        let today = new Date().getDay();
        currentDayView = (today === 0 || today === 6) ? 0 : today - 1;
        setDay(currentDayView);

        tg.ready();
    </script>
</body>
</html>
