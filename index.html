<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>School Terminal Liquid Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --main-color: #00ff41;
            --dark-color: #003300;
            --card-bg: rgba(10, 10, 10, 0.8); /* Сделал прозрачным, чтобы видеть фон */
            --hw-text: #888;
        }

        /* МАГИЯ ЖИВОГО ФОНА */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at center, var(--main-color) 0%, transparent 50%);
            filter: url(#liquid); /* Накладываем эффект разводов */
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1.2); }
        }

        html, body {
            position: fixed;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.3s, color 0.3s;
        }

        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; color: var(--main-color); }

        .control-panel { display: flex; gap: 10px; margin-bottom: 15px; flex-shrink: 0; }
        .back-btn {
            background: var(--main-color); color: var(--bg-color);
            border: none; padding: 15px; border-radius: 10px;
            flex-grow: 1; font-weight: bold; font-family: inherit; cursor: pointer;
        }

        .menu-grid { display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center; }
        .hub-btn {
            background: var(--card-bg); border: 2px solid var(--main-color);
            color: var(--main-color); padding: 30px 20px;
            font-size: 20px; font-weight: bold; border-radius: 15px; font-family: inherit;
            backdrop-filter: blur(5px); /* Размытие под кнопкой */
        }

        .screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        .active-screen { display: flex; }

        .tabs { display: flex; justify-content: space-around; margin-bottom: 10px; border-bottom: 1px solid var(--main-color); flex-shrink: 0; opacity: 0.7; }
        .tab-btn { background: none; border: none; color: var(--main-color); font-size: 18px; padding: 10px; font-family: inherit; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--main-color); }
        
        #schedule-list { flex-grow: 1; overflow-y: auto; padding-bottom: 50px; }
        .lesson-card { background: var(--card-bg); border: 1px solid var(--main-color); border-radius: 12px; padding: 15px; margin-bottom: 12px; backdrop-filter: blur(5px); }
        .lesson-main { display: flex; justify-content: space-between; align-items: center; }
        .lesson-room { border: 1px solid var(--main-color); padding: 5px 10px; border-radius: 6px; font-weight: bold; }
        .hw-input { background: rgba(0,0,0,0.5); border: 1px solid var(--main-color); color: var(--main-color); padding: 10px; width: 100%; box-sizing: border-box; margin-top: 10px; font-family: inherit; border-radius: 5px; }

        .gdz-list { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .gdz-link { background: var(--card-bg); color: var(--main-color); padding: 25px; border-radius: 15px; text-decoration: none; text-align: center; border: 1px solid var(--main-color); font-weight: bold; font-size: 18px; }

        .theme-selector { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .theme-opt { padding: 15px; border-radius: 10px; border: 2px solid; font-weight: bold; text-align: center; cursor: pointer; }

        .edit-input { background: var(--card-bg); color: var(--main-color); padding: 12px; border: 1px solid var(--main-color); width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; border-radius: 8px; }
    </style>
</head>
<body>

    <svg style="display:none">
        <filter id="liquid">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" />
        </filter>
    </svg>

    <div id="main-menu" class="screen active-screen">
        <h1 style="text-align: center; letter-spacing: 5px;">SYSTEM</h1>
        <div class="menu-grid">
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 ЩОДЕННИК</button>
            <button class="hub-btn" onclick="showScreen('gdz-screen')">🔍 ГДЗ</button>
            <button class="hub-btn" style="opacity: 0.6;" onclick="showScreen('settings-screen')">⚙️ ТЕМИ</button>
        </div>
    </div>

    <div id="diary-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
            <button id="edit-toggle-btn" style="background: transparent; color: var(--main-color); border: 1px solid var(--main-color); border-radius: 10px; padding: 0 15px;" onclick="toggleEdit()">РЕД.</button>
        </div>
        
        <div id="diary-view" style="display: flex; flex-direction: column; height: 100%;">
            <div class="tabs">
                <button class="tab-btn active" onclick="setDay(0)">ПН</button>
                <button class="tab-btn" onclick="setDay(1)">ВТ</button>
                <button class="tab-btn" onclick="setDay(2)">СР</button>
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button>
                <button class="tab-btn" onclick="setDay(4)">ПТ</button>
            </div>
            <div id="schedule-list"></div>
        </div>

        <div id="diary-edit" style="display:none; flex-direction: column;">
            <select id="lesson-day" class="edit-input">
                <option value="0">Понеділок</option>
                <option value="1">Вівторок</option>
                <option value="2">Середа</option>
                <option value="3">Четвер</option>
                <option value="4">П'ятниця</option>
            </select>
            <input type="text" id="lesson-name" class="edit-input" placeholder="Назва предмету">
            <input type="text" id="lesson-room" class="edit-input" placeholder="Кабінет">
            <button onclick="addLesson()" style="padding:15px; background:var(--main-color); color:var(--bg-color); border:none; font-weight:bold; border-radius:8px; font-family: inherit;">+ ДОДАТИ</button>
            <div id="edit-list" style="margin-top:20px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="gdz-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <div class="gdz-list">
            <a href="https://vshkole.com" target="_blank" class="gdz-link">VSHKOLE.COM</a>
            <a href="https://gdzonline.net" target="_blank" class="gdz-link">GDZONLINE.NET</a>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="control-panel">
            <button class="back-btn" onclick="showScreen('main-menu')">← МЕНЮ</button>
        </div>
        <h2 style="text-align:center;">ВИБІР ТЕМИ</h2>
        <div class="theme-selector">
            <div class="theme-opt" style="border-color: #00ff41; color: #00ff41; background: #000;" onclick="setTheme('green')">MATRIX GREEN</div>
            <div class="theme-opt" style="border-color: #0077ff; color: #0077ff; background: #000;" onclick="setTheme('blue')">CYBER BLUE</div>
            <div class="theme-opt" style="border-color: #ff0000; color: #ff0000; background: #000;" onclick="setTheme('red')">ALARM RED</div>
            <div class="theme-opt" style="border-color: #888888; color: #888888; background: #000;" onclick="setTheme('gray')">DARK GRAY</div>
            <div class="theme-opt" style="border-color: #000000; color: #000000; background: #ffffff;" onclick="setTheme('light')">LIGHT MODE</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let schedule = JSON.parse(localStorage.getItem('mySchedule')) || [[],[],[],[],[]];
        let currentDayView = 0;

        const themes = {
            green: { main: '#00ff41', bg: '#000000', card: 'rgba(10, 10, 10, 0.8)' },
            blue: { main: '#0077ff', bg: '#000000', card: 'rgba(0, 5, 16, 0.8)' },
            red: { main: '#ff0000', bg: '#000000', card: 'rgba(10, 0, 0, 0.8)' },
            gray: { main: '#888888', bg: '#000000', card: 'rgba(17, 17, 17, 0.8)' },
            light: { main: '#000000', bg: '#ffffff', card: 'rgba(240, 240, 240, 0.8)' }
        };

        function setTheme(name) {
            const theme = themes[name];
            document.documentElement.style.setProperty('--main-color', theme.main);
            document.documentElement.style.setProperty('--bg-color', theme.bg);
            document.documentElement.style.setProperty('--card-bg', theme.card);
            localStorage.setItem('selectedTheme', name);
            tg.HapticFeedback.notificationOccurred('success');
        }

        const savedTheme = localStorage.getItem('selectedTheme') || 'green';
        setTheme(savedTheme);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            if(id === 'diary-screen') {
                document.getElementById('diary-view').style.display = 'flex';
                document.getElementById('diary-edit').style.display = 'none';
                renderSchedule();
            }
        }

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            const lessons = schedule[currentDayView];
            if (lessons.length === 0) { list.innerHTML = '<div style="text-align:center;margin-top:50px;opacity:0.3">ПУСТО</div>'; return; }
            lessons.forEach((l, i) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div class="lesson-main">
                        <div><small style="opacity:0.6">${i+1} УРОК</small><br><b>${l.name}</b></div>
                        <div class="lesson-room">${l.room}</div>
                    </div>
                    <input type="text" class="hw-input" placeholder="ДЗ..." value="${l.hw || ''}" onchange="saveHW(${currentDayView},${i},this.value)">
                `;
                list.appendChild(card);
            });
        }

        function saveHW(d, i, v) {
            schedule[d][i].hw = v;
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            tg.HapticFeedback.impactOccurred('light');
        }

        function setDay(i) {
            currentDayView = i;
            document.querySelectorAll('.tab-btn').forEach((b, idx) => b.className = idx === i ? 'tab-btn active' : 'tab-btn');
            renderSchedule();
        }

        function toggleEdit() {
            const v = document.getElementById('diary-view');
            const e = document.getElementById('diary-edit');
            const btn = document.getElementById('edit-toggle-btn');
            if(v.style.display === 'none') {
                v.style.display = 'flex'; e.style.display = 'none'; btn.innerText = 'РЕД.'; renderSchedule();
            } else {
                v.style.display = 'none'; e.style.display = 'flex'; btn.innerText = 'ОК'; renderEditList();
            }
        }

        function addLesson() {
            const d = document.getElementById('lesson-day').value;
            const n = document.getElementById('lesson-name').value.trim();
            const r = document.getElementById('lesson-room').value.trim();
            if(n && r) {
                schedule[d].push({name: n, room: r, hw: ''});
                localStorage.setItem('mySchedule', JSON.stringify(schedule));
                document.getElementById('lesson-name').value = '';
                document.getElementById('lesson-room').value = '';
                renderEditList();
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = '';
            const days = ['ПН','ВТ','СР','ЧТ','ПТ'];
            schedule.forEach((day, dIdx) => {
                day.forEach((l, lIdx) => {
                    const item = document.createElement('div');
                    item.style = 'display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #555; font-size:14px;';
                    item.innerHTML = `<span>${days[dIdx]}: ${l.name}</span><button onclick="deleteLesson(${dIdx},${lIdx})" style="color:red; background:none; border:none; font-family:inherit;">[X]</button>`;
                    list.appendChild(item);
                });
            });
        }

        function deleteLesson(d, l) {
            schedule[d].splice(l, 1);
            localStorage.setItem('mySchedule', JSON.stringify(schedule));
            renderEditList();
        }

        let today = new Date().getDay();
        currentDayView = (today === 0 || today === 6) ? 0 : today - 1;
        setDay(currentDayView);
        tg.ready();
    </script>
</body>
</html>
