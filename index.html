<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>School Hub Cloud</title>
    <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/512/terminal.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        :root { --bg-color: #000; --main-color: #00ff41; --card-bg: #0d0d0d; }
        body { background: var(--bg-color); color: var(--main-color); font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .screen { display: none; flex-direction: column; height: 100vh; }
        .active-screen { display: flex; }
        
        /* Кнопки */
        .hub-btn { background: var(--card-bg); border: 2px solid var(--main-color); color: var(--main-color); padding: 20px; margin: 10px 0; border-radius: 12px; font-weight: bold; font-family: inherit; width: 100%; cursor: pointer; text-transform: uppercase; }
        .hub-btn:active { background: var(--main-color); color: #000; }
        
        /* Карточки уроков */
        .lesson-card { border: 1px solid var(--main-color); padding: 15px; margin-bottom: 12px; border-radius: 12px; background: rgba(0, 255, 65, 0.05); }
        .hw-input { background: transparent; border: 1px solid #333; color: #fff; width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        
        /* Табы дней */
        .tabs { display: flex; justify-content: space-around; margin-bottom: 15px; border-bottom: 1px solid #222; }
        .tab-btn { background: none; border: none; color: var(--main-color); padding: 10px; font-family: inherit; opacity: 0.4; font-size: 16px; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--main-color); }

        /* Загрузка */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; justify-content: center; align-items: center; z-index: 1000; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="loader">CONNECTING...</div>

    <div id="auth-screen" class="screen active-screen" style="justify-content: center;">
        <h1 style="text-align: center; letter-spacing: 3px;">TERMINAL LOGIN</h1>
        <p style="text-align: center; opacity: 0.6; font-size: 14px;">Введіть свій персональний ID,<br>щоб отримати доступ до даних:</p>
        <input type="text" id="user-id-input" style="width:100%; padding:15px; background:#111; color:var(--main-color); border:1px solid var(--main-color); border-radius:10px; text-align:center; box-sizing:border-box;" placeholder="ваш_нік_англійською">
        <button class="hub-btn" onclick="login()">УВІЙТИ</button>
    </div>

    <div id="main-menu" class="screen">
        <div style="text-align: right; font-size: 12px; opacity: 0.5;">USER: <span id="display-id"></span></div>
        <h1 style="text-align: center; margin: 40px 0;">SYSTEM HUB</h1>
        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
            <button class="hub-btn" onclick="showScreen('diary-screen')">📂 МІЙ ЩОДЕННИК</button>
            <button class="hub-btn" style="border-color: #444; color: #444;" onclick="logout()">🔌 ВИЙТИ</button>
        </div>
    </div>

    <div id="diary-screen" class="screen">
        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <button onclick="showScreen('main-menu')" style="background:var(--main-color); color:#000; border:none; padding:12px; border-radius:8px; font-weight:bold;">←</button>
            <button onclick="toggleEdit()" id="edit-toggle-btn" style="flex-grow:1; background:transparent; border:1px solid var(--main-color); color:var(--main-color); border-radius:8px; font-family:inherit;">РЕДАГУВАТИ</button>
        </div>

        <div id="diary-view">
            <div class="tabs">
                <button class="tab-btn active" onclick="setDay(0)">ПН</button>
                <button class="tab-btn" onclick="setDay(1)">ВТ</button>
                <button class="tab-btn" onclick="setDay(2)">СР</button>
                <button class="tab-btn" onclick="setDay(3)">ЧТ</button>
                <button class="tab-btn" onclick="setDay(4)">ПТ</button>
            </div>
            <div id="schedule-list" style="overflow-y:auto; flex-grow:1;"></div>
        </div>

        <div id="diary-edit" style="display:none; overflow-y:auto;">
            <select id="lesson-day" style="width:100%; padding:12px; background:#111; color:var(--main-color); border:1px solid var(--main-color); border-radius:8px; margin-bottom:10px;">
                <option value="0">Понеділок</option><option value="1">Вівторок</option>
                <option value="2">Середа</option><option value="3">Четвер</option><option value="4">П'ятниця</option>
            </select>
            <input type="text" id="lesson-name" style="width:100%; padding:12px; background:#111; color:var(--main-color); border:1px solid var(--main-color); border-radius:8px; margin-bottom:10px; box-sizing:border-box;" placeholder="Назва предмету">
            <input type="text" id="lesson-room" style="width:100%; padding:12px; background:#111; color:var(--main-color); border:1px solid var(--main-color); border-radius:8px; margin-bottom:10px; box-sizing:border-box;" placeholder="Кабінет">
            <button class="hub-btn" onclick="addLesson()">+ ДОДАТИ</button>
            <div id="edit-list" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const BUCKET_URL = "https://kvdb.io/4pYx7pA1Yv9sUu8gGzGzGz/"; 
        
        let userId = localStorage.getItem('school_user_id');
        let schedule = [[],[],[],[],[]];
        let currentDay = 0;

        async function login() {
            const id = document.getElementById('user-id-input').value.trim().toLowerCase();
            if(id.length < 3) return alert("Нік занадто короткий!");
            
            userId = id;
            localStorage.setItem('school_user_id', id);
            await loadFromCloud();
            showScreen('main-menu');
        }

        function logout() {
            localStorage.removeItem('school_user_id');
            location.reload();
        }

        async function loadFromCloud() {
            document.getElementById('loader').style.display = 'flex';
            try {
                const response = await fetch(BUCKET_URL + userId);
                if (response.ok) {
                    schedule = await response.json();
                } else {
                    schedule = [[],[],[],[],[]]; // Новый юзер
                }
            } catch (e) { schedule = [[],[],[],[],[]]; }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('display-id').innerText = userId;
            renderSchedule();
        }

        async function saveToCloud() {
            fetch(BUCKET_URL + userId, {
                method: 'POST',
                body: JSON.stringify(schedule)
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function renderSchedule() {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            const lessons = schedule[currentDay] || [];
            if(lessons.length === 0) list.innerHTML = '<p style="text-align:center; opacity:0.3; margin-top:50px;">РОЗКЛАД ПОРОЖНІЙ</p>';
            lessons.forEach((l, i) => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${i+1}. ${l.name}</b>
                        <span style="font-size:12px; border:1px solid; padding:2px 6px; border-radius:4px;">${l.room}</span>
                    </div>
                    <input type="text" class="hw-input" placeholder="ДЗ..." value="${l.hw || ''}" onchange="updateHW(${i}, this.value)">
                `;
                list.appendChild(card);
            });
        }

        function updateHW(idx, val) {
            schedule[currentDay][idx].hw = val;
            saveToCloud();
        }

        function setDay(i) {
            currentDay = i;
            document.querySelectorAll('.tab-btn').forEach((b, idx) => b.className = idx === i ? 'tab-btn active' : 'tab-btn');
            renderSchedule();
        }

        function toggleEdit() {
            const v = document.getElementById('diary-view');
            const e = document.getElementById('diary-edit');
            const btn = document.getElementById('edit-toggle-btn');
            if(v.style.display === 'none') { v.style.display = 'block'; e.style.display = 'none'; btn.innerText = 'РЕДАКТУВАТИ'; renderSchedule(); }
            else { v.style.display = 'none'; e.style.display = 'block'; btn.innerText = 'ГОТОВО'; renderEditList(); }
        }

        function addLesson() {
            const d = document.getElementById('lesson-day').value;
            const n = document.getElementById('lesson-name').value;
            const r = document.getElementById('lesson-room').value;
            if(n) {
                schedule[d].push({name: n, room: r, hw: ''});
                saveToCloud();
                renderEditList();
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = '';
            const d = document.getElementById('lesson-day').value;
            schedule[d].forEach((l, i) => {
                const item = document.createElement('div');
                item.style = "display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;";
                item.innerHTML = `<span>${l.name}</span><button onclick="deleteLesson(${d},${i})" style="color:red; background:none; border:none; font-family:inherit;">[X]</button>`;
                list.appendChild(item);
            });
        }

        function deleteLesson(d, i) {
            schedule[d].splice(i, 1);
            saveToCloud();
            renderEditList();
        }

        // Проверка при запуске
        if(userId) {
            loadFromCloud();
            showScreen('main-menu');
        }
    </script>
</body>
</html>
